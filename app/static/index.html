<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment starter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    #status {
      font-size: 0.95rem;
      margin-top: 1rem;
    }

    .ok {
      color: #15803d;
    }

    .error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <main>
    <h1>Deployment starter</h1>
    <p>Deployment starter is live</p>
    <p id="status">Checking backend…</p>
  </main>
  <script>
    const statusEl = document.getElementById("status");

    fetch("/api/health")
      .then((response) => {
        if (!response.ok) throw new Error("Bad response");
        return response.json();
      })
      .then((data) => {
        if (data.status === "ok") {
          statusEl.textContent = "Backend connected";
          statusEl.className = "ok";
        } else {
          throw new Error("Unexpected status");
        }
      })
      .catch(() => {
        statusEl.textContent = "Backend unreachable";
        statusEl.className = "error";
      });
  </script>
</body>
</html>
